<!DOCTYPE html>
<html>
<head>
  <title>For My Love ❤️</title>
  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
      color: #b30059;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    h1 {
      color: #ff3366;
    }
    .heart {
      font-size: 50px;
      animation: beat 1s infinite;
    }
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="heart">❤️</div>
    <h1>Happy Valentine Week My Love</h1>

    <p>My Dear ❤️,</p>

    <p>
      From the day
